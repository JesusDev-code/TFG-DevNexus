<div class="admin-child-content">
  <div class="profile-premium-card">
    
    <div class="perfil-avatar-section">
      <div class="perfil-avatar-outer">
        <div class="glow-aura"></div>
        <img *ngIf="formData.foto_perfil" [src]="formData.foto_perfil" class="perfil-avatar">
        <div *ngIf="!formData.foto_perfil" class="perfil-avatar placeholder">
          {{ inicial }}
        </div>
        
        <button class="perfil-avatar-cam" id="open-admin-avatar-selector">
          <ion-icon name="camera-outline"></ion-icon>
        </button>
      </div>

      <div class="info-text">
        <h2 class="perfil-nombre">{{ formData.nombre }}</h2>
        <p class="perfil-email">{{ formData.email }}</p>
        <span class="badge-admin">ADMINISTRADOR</span>
      </div>
    </div>

    <ion-modal #modal trigger="open-admin-avatar-selector" [initialBreakpoint]="0.5" [breakpoints]="[0, 0.5, 0.8]" class="glass-modal">
      <ng-template>
        <div class="modal-dark-content">
          <div class="modal-header">
            <h3>Elige tu <span class="text-gradient">Avatar</span></h3>
          </div>
          <div class="avatar-grid-premium">
            <img *ngFor="let avatar of avataresDisponibles" [src]="avatar" 
                 (click)="seleccionarAvatar(avatar, modal)" 
                 class="avatar-option" [class.selected]="formData.foto_perfil === avatar">
          </div>
        </div>
      </ng-template>
    </ion-modal>

    <form class="perfil-form-glass" (ngSubmit)="guardarCambios()">
      
      <div class="input-group">
        <label>Nombre Completo</label>
        <input type="text" name="nombre" [(ngModel)]="formData.nombre" placeholder="Tu nombre">
      </div>

      <div class="input-group">
        <label>Tu Especialidad Técnica</label>
        <div class="roles-grid-glass">
          <div *ngFor="let d of departamentos" 
               class="role-pill-card" 
               [class.selected]="formData.departamentoId === d.id"
               (click)="seleccionarRol(d.id)">
            <ion-icon [name]="getIconoRol(d.nombre)"></ion-icon>
            <span>{{ d.nombre }}</span>
          </div>
        </div>
      </div>

      <div class="input-group">
        <label>Email Corporativo (Solo lectura)</label>
        <div class="readonly-box">{{ formData.email }}</div>
      </div>

      <div class="toggle-glass-row">
        <div class="text">
          <label>Permitir contacto</label>
          <p>Activa esta opción para ser visible en el chat de la comunidad.</p>
        </div>
        <ion-toggle name="permiteContacto" [(ngModel)]="formData.permiteContacto" color="success"></ion-toggle>
      </div>

      <div class="input-group">
        <label>Biografía Profesional</label>
        <textarea name="biografia" rows="4" [(ngModel)]="formData.biografia" placeholder="Cuéntanos sobre tu trayectoria..."></textarea>
      </div>

      <button class="btn-save-gradient" type="submit" [disabled]="isLoading">
        <ion-icon [name]="isLoading ? 'refresh-outline' : 'save-outline'" [class.spin]="isLoading"></ion-icon>
        <span>{{ isLoading ? 'Actualizando...' : 'Guardar Cambios' }}</span>
      </button>

    </form>
  </div>
</div>
