version: '3.8'

services:
  app:
    image: tagoh1/springboot-tfg:latest
    container_name: spring-tfg-prod
    restart: always
    # ✅ ELIMINA env_file, pasa variables directamente
    environment:
      # Conexión a Neon (PostgreSQL cloud)
      SPRING_DATASOURCE_URL: jdbc:postgresql://ep-fancy-leaf-ag6cyj6b-pooler.c-2.eu-central-1.aws.neon.tech:5432/neondb
      SPRING_DATASOURCE_USERNAME: neondb
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}

      # Firebase
      FIREBASE_SA_B64: ${FIREBASE_SA_B64}  # ✅ PON TU BASE64 REAL

      # Perfil y healthcheck
      SPRING_PROFILES_ACTIVE: prod
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_HEALTH_DB_ENABLED: "true"

    ports:
      - "8080:8080"
    networks:
      - tfg-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Aumentado a 60s

networks:
  tfg-net:
    driver: bridge