spring:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8080

firebase:
  sa-b64: ${FIREBASE_SA_B64}

groq:
  api-key: ${GROQ_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
